<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <title>Tsukimi GNOME-style application icon</title>
  <desc>Vector redesign of the Tsukimi moon icon in a GNOME/GTK app icon style.</desc>

  <defs>
    <linearGradient id="bg" x1="22" y1="13" x2="110" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a3c94"/>
      <stop offset="0.45" stop-color="#613583"/>
      <stop offset="1" stop-color="#241f31"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="54" cy="45" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dc8add" stop-opacity="0.50"/>
      <stop offset="0.48" stop-color="#9141ac" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#241f31" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="moonFace" cx="45" cy="33" r="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#f6f5f4"/>
      <stop offset="1" stop-color="#e9d7ef"/>
    </radialGradient>

    <linearGradient id="sphereBase" x1="37" y1="24" x2="93" y2="99" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f5f4"/>
      <stop offset="0.44" stop-color="#e9d7ef"/>
      <stop offset="0.58" stop-color="#c061cb"/>
      <stop offset="1" stop-color="#613583"/>
    </linearGradient>

    <linearGradient id="lowerBand" x1="42" y1="58" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c061cb"/>
      <stop offset="0.58" stop-color="#813d9c"/>
      <stop offset="1" stop-color="#3d2a62"/>
    </linearGradient>

    <linearGradient id="rim" x1="37" y1="77" x2="97" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c061cb" stop-opacity="0"/>
      <stop offset="0.58" stop-color="#c061cb" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#dc8add" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="crater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a3c95"/>
      <stop offset="1" stop-color="#4b3375"/>
    </linearGradient>



    <clipPath id="sphereClip">
      <circle cx="64" cy="60" r="36"/>
    </clipPath>

    <path id="sparkle" d="M0,-7 C0.9,-2.6 2.6,-0.9 7,0 C2.6,0.9 0.9,2.6 0,7 C-0.9,2.6 -2.6,0.9 -7,0 C-2.6,-0.9 -0.9,-2.6 0,-7 Z"/>
  </defs>

  <!-- GNOME-style rounded app tile -->
  <rect x="9" y="11" width="110" height="108" rx="26" fill="#000000" opacity="0.22"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bgGlow)"/>
  <path d="M120 43 L120 120 L48 120 L78 74 L86 41 Z" fill="#241f31" opacity="0.18"/>

  <!-- small stars, kept simple for app-icon legibility -->
  <g fill="#ffffff" opacity="0.96">
    <use href="#sparkle" transform="translate(100 33) scale(0.62)"/>
    <use href="#sparkle" transform="translate(29 91) scale(0.55)"/>
    <use href="#sparkle" transform="translate(101 25) scale(0.33)"/>
    <circle cx="25" cy="77" r="1.2"/>
    <circle cx="94" cy="43" r="1.4"/>
    <circle cx="35" cy="85" r="0.9"/>
  </g>

  <!-- soft ground shadow -->
  <ellipse cx="66" cy="88" rx="38" ry="12" fill="#000000" opacity="0.25"/>

  <!-- moon planet -->
  <g transform="rotate(-18 64 62)">
    <circle cx="64" cy="60" r="36" fill="url(#sphereBase)"/>

    <!-- purple lower hemisphere -->
    <g clip-path="url(#sphereClip)">
      <path d="M24 59 C38 73 53 80 71 79 C85 78 98 72 106 61 L106 100 L24 100 Z" fill="url(#lowerBand)"/>
      <path d="M25 68 C40 82 58 88 77 86 C90 85 100 78 107 67" fill="none" stroke="#4e2e76" stroke-opacity="0.45" stroke-width="1.1"/>
      <path d="M28 78 C43 90 62 95 80 92 C92 90 101 84 107 75" fill="none" stroke="#4e2e76" stroke-opacity="0.35" stroke-width="1"/>
      <path d="M36 88 C53 98 76 100 95 88" fill="none" stroke="#dc8add" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
      <path d="M33 60 C45 69 59 73 75 72 C87 71 96 66 104 59" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1"/>
    </g>

    <!-- light lunar cap -->
    <g clip-path="url(#sphereClip)">
      <path d="M27 52 C29 31 48 20 69 22 C86 24 96 34 97 48 C97 63 84 72 71 70 C60 68 59 80 50 83 C38 87 27 75 27 52 Z" fill="url(#moonFace)"/>
      <path d="M55 20 C66 23 70 31 68 41 C66 52 54 55 49 65 C43 77 34 79 27 74 L27 31 Z" fill="#ffffff" opacity="0.58"/>
      <path d="M75 25 C86 29 92 38 93 49 C94 59 89 66 80 70" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- craters: fewer, rounder, with GNOME-ish high contrast -->
    <g clip-path="url(#sphereClip)">
      <circle cx="43" cy="42" r="3.2" fill="url(#crater)"/>
      <circle cx="54" cy="56" r="6.2" fill="url(#crater)"/>
      <circle cx="35" cy="62" r="4.4" fill="url(#crater)"/>
      <circle cx="65" cy="76" r="5" fill="url(#crater)" opacity="0.88"/>
      <circle cx="81" cy="62" r="4.3" fill="url(#crater)" opacity="0.76"/>
      <circle cx="75" cy="43" r="3.4" fill="#a852a7" opacity="0.78"/>
      <circle cx="59" cy="33" r="1.9" fill="#c061cb" opacity="0.72"/>
      <circle cx="88" cy="51" r="1.7" fill="#4e2e76" opacity="0.72"/>
      <circle cx="52" cy="74" r="2.5" fill="#dc8add" opacity="0.70"/>
      <circle cx="44" cy="36" r="1.6" fill="#8a3c95" opacity="0.75"/>
    </g>

    <!-- clean outer outline and bottom rim -->
    <circle cx="64" cy="60" r="36" fill="none" stroke="#241f31" stroke-opacity="0.22" stroke-width="1"/>
    <path d="M32 77 C48 91 77 96 97 78" fill="none" stroke="url(#rim)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- foreground glint -->
  <circle cx="71" cy="36" r="7" fill="#ffffff" opacity="0.12"/>
</svg>
