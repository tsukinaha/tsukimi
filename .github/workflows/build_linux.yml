name: Linux
on:
  workflow_call:

jobs:
  build:
    name: Build (${{ matrix.platform }})

    strategy:
      matrix:
        include:
          - platform: amd64
            os: ubuntu-latest
          - platform: arm64
            os: ubuntu-24.04-arm

    container:
      image: ubuntu:resolute

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y git wget
          apt-get install -y --no-install-recommends build-essential curl gettext pkg-config libssl-dev libgtk-4-dev \
          libadwaita-1-dev libmpv-dev libgstreamer1.0-dev libgstreamer-plugins-bad1.0-dev \
          libgstreamer-plugins-base1.0-dev libgstreamer-plugins-extra1.0-dev gstreamer1.0-libav
          bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "-Clinker-plugin-lto -Clinker=clang -Clink-arg=-fuse-ld=lld"
      
      - name: Setup clang
        run: |
          RUSTC_LLVM_VER=$(rustc -vV | sed -n 's/^LLVM version: \([0-9]*\).*/\1/p')
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $RUSTC_LLVM_VER
          git clean -fdx

      - name: Build tsukimi for ${{ matrix.platform }}
        env:
          DANDANAPI_SECRET_KEY: ${{ secrets.DANDANAPI_SECRET_KEY }}
        run: |
          echo $DANDANAPI_SECRET_KEY > secret/key
          cargo build --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tsukimi-${{ matrix.platform }}-linux
          path: |
            target/release/tsukimi
            i18n/locale
            resources/moe*.xml
