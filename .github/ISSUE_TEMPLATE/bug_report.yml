name: Bug report
description: Create a report to help us improve
title: ""
labels:
  - bug
  - pending
assignees:
  - tsukinaha
body:
  - type: markdown
    attributes:
      value: |
        ## Important

        请遵守 Issue Template，并完整填写以下内容，否则提交的 Issue 可能会被视为无效。

        如果日志包含敏感信息，可以将日志作为附件发送至 `tkmreport@notalium.co`。

        To collect a log, run `tsukimi -f /path/to/log` in your terminal.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirm the following information
      options:
        - label: I have searched the existing issues and found no duplicate.
          required: true
        - label: I have obtained the complete log.
          required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. NixOS 24.11
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: e.g. x86_64
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: e.g. NVIDIA GTX 690
    validations:
      required: true

  - type: input
    id: compositor
    attributes:
      label: Compositor
      placeholder: e.g. KWin Wayland
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tsukimi version
      placeholder: e.g. 0.11.4
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Provide a clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the complete log here. Logs are automatically formatted as code.
      render: shell
    validations:
      required: true
